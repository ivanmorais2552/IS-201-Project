<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA JAM Shootout</title>
    <link rel="stylesheet" href="css/scratch.css" />
 <Header class="menu">

 </Header>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #111;
        font-family: Impact, sans-serif;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction:column; /* ADD THIS */
        justify-content: center;
        align-items: center;
      }

      .game {
        width: 900px;
        max-width: 95%;
        text-align: center;
      }

      h1 {
        font-size: 4rem;
        color: #ffcc00;
        text-shadow: 4px 4px red;
        margin-bottom: 20px;
      }

      .scoreboard {
        display: flex;
        justify-content: center;
        gap: 50px;
        font-size: 1.5rem;
        margin-bottom: 20px;
      }

      .court {
        position: relative;
        height: 450px;
        background: repeating-linear-gradient(
          90deg,
          #8b5a2b 0px,
          #8b5a2b 80px,
          #9f6a37 80px,
          #9f6a37 160px
        );
        border: 6px solid gold;
        overflow: hidden;
      }

      /* hoop */

      .backboard {
        position: absolute;
        right: 120px;
        top: 120px;
        width: 12px;
        height: 100px;
        background: white;
      }

      .rim {
        position: absolute;
        right: 132px;
        top: 180px;
        width: 80px;
        height: 8px;
        background: red;
      }

      /* ball */

      .ball {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: orange;
        border: 3px solid brown;
        left: 120px;
        top: 330px;
      }

      /* perfect shot */

      .ball.shoot {
        animation: swish 1s forwards;
      }

      @keyframes swish {
        0% {
          left: 120px;
          top: 330px;
        }

        30% {
          left: 280px;
          top: 120px;
        }

        60% {
          left: 520px;
          top: 80px;
        }

        100% {
          left: 650px;
          top: 170px;
        }
      }

      /* meter */

      .meter {
        width: 700px;
        max-width: 100%;
        height: 40px;
        margin: 25px auto;
        background: #222;
        border: 4px solid white;
        position: relative;
      }

      .green {
        position: absolute;
        left: 45%;
        width: 12%;
        height: 100%;
        background: lime;
      }

      .indicator {
        position: absolute;
        width: 10px;
        height: 100%;
        background: white;
      }

      .message {
        margin-top: 20px;
        font-size: 2rem;
        height: 50px;
      }

      .fire {
        color: orange;
      }
    </style>
  </head>
  <body>
    <div class="game">
      <h1>NBA JAM SHOOTOUT</h1>

      <div class="scoreboard">
        <div>SCORE: <span id="score">0</span></div>
        <div>STREAK: <span id="streak">0</span></div>
      </div>

      <div class="court">
        <div class="backboard"></div>
        <div class="rim"></div>

        <div class="ball" id="ball"></div>
      </div>

      <div class="meter">
        <div class="green"></div>

        <div class="indicator" id="indicator"></div>
      </div>

      <p>Press SPACE when the bar is in the green zone.</p>

      <div class="message" id="message">READY?</div>
    </div>

    <script>
      const indicator = document.getElementById("indicator");
      const ball = document.getElementById("ball");
      const scoreEl = document.getElementById("score");
      const streakEl = document.getElementById("streak");
      const message = document.getElementById("message");

      let score = 0;
      let streak = 0;
      let pos = 0;
      let dir = 1;
      let shooting = false;

      setInterval(() => {
        if (shooting) return;

        pos += dir * 5;

        if (pos > 690) dir = -1;
        if (pos < 0) dir = 1;

        indicator.style.left = pos + "px";
      }, 10);

      function shoot() {
        if (shooting) return;

        shooting = true;

        const made = pos >= 315 && pos <= 399;

        if (made) {
          ball.classList.add("shoot");

          score += 2;
          streak++;

          scoreEl.textContent = score;
          streakEl.textContent = streak;

          if (streak >= 3) {
            message.innerHTML = "🔥 HE'S ON FIRE! 🔥";
            message.classList.add("fire");
          } else {
            message.innerHTML = "SWISH!";
          }
        } else {
          streak = 0;
          streakEl.textContent = 0;
          message.innerHTML = "BRICK!";
          message.classList.remove("fire");

          ball.animate(
            [
              { left: "120px", top: "330px" },
              { left: "320px", top: "140px" },
              { left: "500px", top: "260px" },
            ],
            {
              duration: 1000,
              fill: "forwards",
            },
          );
        }

        setTimeout(() => {
          ball.classList.remove("shoot");

          ball.style.left = "120px";
          ball.style.top = "330px";

          shooting = false;
        }, 1000);
      }

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          shoot();
        }
      });
    </script>
  </body>
</html>
